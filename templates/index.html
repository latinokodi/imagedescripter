<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Image Describer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="app-container">

        <!-- SIDEBAR: CONFIGURATION -->
        <aside class="sidebar glass-panel">
            <div class="brand">
                <div class="logo-icon">✨</div>
                <h1>Image Describer</h1>
            </div>

            <div class="settings-scroll-area">

                <div class="setting-group">
                    <label for="apiUrl">API Endpoint</label>
                    <input type="text" id="apiUrl" class="input-modern" value="http://localhost:1234/v1">
                    <span class="hint" id="apiHint">Default: http://localhost:1234/v1</span>
                </div>

                <div class="setting-group">
                    <label for="modelName">Vision Model</label>
                    <input type="text" id="modelName" class="input-modern" value="qwen3-vl-8b">
                </div>

                <div class="setting-group" id="basePromptGroup">
                    <label for="promptText">Base Prompt</label>
                    <textarea id="promptText" class="input-modern"
                        rows="3">Describe this image in detail. Include the subject, composition, colors, mood, lighting, style, and any notable elements.</textarea>
                </div>

                <div class="setting-group">
                    <label for="promptPreset">Prompt Template</label>
                    <select id="promptPreset" class="input-modern">
                        <option value="Detailed Description" selected>Detailed Description</option>
                        <option value="Tags">Tags</option>
                        <option value="Simple Description">Simple Description</option>
                        <option value="Ultra Detailed Description">Ultra Detailed Description</option>
                        <option value="Cinematic Description">Cinematic Description</option>
                        <option value="Detailed Analysis">Detailed Analysis</option>
                        <option value="None">None</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label for="customInstructions">Custom Instructions</label>
                    <textarea id="customInstructions" class="input-modern" rows="3"
                        placeholder="e.g. Focus on color scheme..."></textarea>
                </div>

                <div class="setting-group">
                    <label for="outputName">Output Filename</label>
                    <input type="text" id="outputName" class="input-modern" value="image_descriptions.md">
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="btnCheckHealth" class="btn btn-outline">
                    <span class="icon">⚡</span> Test Connection
                </button>
                <div class="connection-status" id="connectionStatus">
                    <div class="status-dot"></div>
                    <span class="status-text">Disconnected</span>
                </div>
            </div>
        </aside>

        <!-- MAIN AREA -->
        <main class="main-area">

            <!-- TOP ACTION BAR -->
            <header class="action-bar glass-panel">
                <div class="folder-selector">
                    <button id="btnBrowse" class="btn btn-secondary">
                        <span class="icon">📁</span> Select Directory
                    </button>
                    <div class="folder-info">
                        <div id="folderPath" class="path-text">No directory selected</div>
                        <div id="folderCount" class="count-text">Ready to process</div>
                    </div>
                </div>
                <div class="actions">
                    <button id="btnStart" class="btn btn-primary" disabled>
                        <span class="icon">▶</span> Start Processing
                    </button>
                </div>
            </header>

            <!-- PROGRESS BAR -->
            <div id="progressSection" class="progress-section hidden">
                <div class="progress-info">
                    <span id="progressLabel">Processing...</span>
                    <span id="progressCounter">0 / 0</span>
                </div>
                <div class="progress-track">
                    <div id="progressBar" class="progress-fill"></div>
                </div>
            </div>

            <!-- SPLIT CONTENT AREA -->
            <div class="content-split">

                <!-- TERMINAL LOGS -->
                <div class="terminal-panel glass-panel">
                    <div class="panel-header">
                        <h3>Event Log</h3>
                    </div>
                    <div id="logContainer" class="log-container">
                        <div class="log-placeholder">System initialized. Awaiting commands...</div>
                    </div>
                </div>

                <!-- PREVIEW RESULTS -->
                <div id="resultSection" class="results-panel glass-panel hidden">
                    <div class="panel-header">
                        <h3><span class="icon text-success">✓</span> Completed</h3>
                        <button id="btnCopy" class="btn btn-small btn-primary-light">Copy Markdown</button>
                    </div>
                    <div id="resultPath" class="result-path"></div>
                    <pre><code id="resultContent" class="code-output"></code></pre>
                </div>

            </div>

        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
